<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Haras ET · Portal</title>
<link rel="stylesheet" href="theme.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="api.js"></script>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#FAF7F2"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Haras ET"/>
<link rel="apple-touch-icon" href="logo.jpg"/>
<style>
body{min-height:100vh;position:relative;overflow-x:hidden}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(80vw,500px);height:min(80vw,500px);border-radius:50%;background:url('logo.jpg') center/cover no-repeat;opacity:0.05;pointer-events:none;z-index:0}

/* HEADER */
.portal-header{background:var(--card);border-bottom:1.5px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(61,46,30,0.06)}
.header-left{display:flex;align-items:center;gap:.75rem}
.header-left img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2)}
.header-left h2{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold);letter-spacing:.08em}
.header-left p{font-size:.68rem;color:var(--txt3);margin-top:.1rem}
.sair-btn{background:transparent;border:1.5px solid var(--border);color:var(--txt3);font-size:.72rem;padding:.4rem .9rem;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.sair-btn:hover{border-color:var(--red);color:var(--red)}

/* CONTENT */
.portal-body{max-width:680px;margin:0 auto;padding:1.5rem;position:relative;z-index:1}

/* WELCOME */
.welcome{background:linear-gradient(135deg,#FFFBF0,#FFF8E7);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(184,134,11,0.08)}
.welcome h3{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);margin-bottom:.3rem}
.welcome p{font-size:.82rem;color:var(--txt2);line-height:1.6}

/* RESUMO */
.resumo{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.5rem}
.rc{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.2rem;text-align:center}
.rc .rv{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);margin-bottom:.2rem}
.rc .rl{font-size:.62rem;color:var(--txt3);letter-spacing:.15em;text-transform:uppercase}
.rc.green .rv{color:var(--green)}
.rc.orange .rv{color:var(--orange)}

/* FATURAS */
.section-title{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;color:var(--txt3);text-transform:uppercase;margin-bottom:.8rem}
.fatura-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:.6rem;overflow:hidden;transition:box-shadow .2s}
.fatura-card:hover{box-shadow:var(--shadow)}
.fatura-top{padding:1.2rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:1rem}
.ft-left h4{font-size:.9rem;color:var(--txt);font-weight:500;margin-bottom:.25rem}
.ft-left p{font-size:.72rem;color:var(--txt2)}
.ft-right{text-align:right;flex-shrink:0}
.ft-right .fv{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:600}
.ft-right .fd{font-size:.68rem;color:var(--txt3);margin-top:.15rem}
.chevron{color:var(--txt3);font-size:.8rem;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}

/* FATURA BODY */
.fatura-body{display:none;border-top:1.5px solid var(--border);padding:1.2rem 1.5rem;background:var(--bg)}
.fatura-body.open{display:block}
.itens-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:.82rem}
.itens-table th{color:var(--txt3);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;padding:.5rem .6rem;border-bottom:1.5px solid var(--border);text-align:left;font-weight:500}
.itens-table td{padding:.55rem .6rem;color:var(--txt2);border-bottom:1px solid var(--border)}
.itens-table tr:last-child td{border-bottom:none;font-weight:600;color:var(--gold)}

/* PIX BOX */
.pix-box{background:linear-gradient(135deg,#FFFBF0,#FFF8E7);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;margin-bottom:1rem}
.pix-box h4{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.2em;color:var(--gold);margin-bottom:.8rem}
.pix-amount{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);font-weight:600;margin-bottom:1rem}
.pix-qr{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px;display:inline-block;margin-bottom:1rem}
.pix-qr img{width:150px;height:150px;display:block}
.pix-key{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.8rem}
.pix-key span{font-size:.85rem;color:var(--txt);font-weight:500}
.copy-btn{background:var(--gold);color:#FAF7F2;border:none;border-radius:6px;padding:.35rem .8rem;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.copy-btn:hover{background:var(--gold-l)}
.pix-steps{font-size:.75rem;color:var(--txt2);line-height:1.8;text-align:left;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:.8rem 1rem}
.pix-steps strong{color:var(--txt)}
.pago-ok{background:var(--green-bg);border:1.5px solid rgba(46,125,50,.25);border-radius:var(--radius);padding:1rem;text-align:center;color:var(--green);font-size:.85rem;font-weight:500;margin-bottom:1rem}
.fatura-actions{display:flex;gap:.6rem;flex-wrap:wrap}
@media(max-width:480px){
  .resumo{grid-template-columns:1fr 1fr}
  .resumo .rc:last-child{grid-column:span 2}
  .portal-body{padding:1rem}
}
</style>
</head>
<body>

<div class="watermark"></div>

<header class="portal-header">
  <div class="header-left">
    <img src="logo.jpg" alt="Haras ET"/>
    <div>
      <h2>Haras ET</h2>
      <p id="header-nome">Portal do Cliente</p>
    </div>
  </div>
  <button class="sair-btn" onclick="sair()">Sair</button>
</header>

<div class="portal-body">
  <div class="welcome" id="welcome-box">
    <h3>Bem-vindo, <span id="welcome-nome"></span>!</h3>
    <p>Acompanhe suas faturas e realize pagamentos via PIX com facilidade.</p>
  </div>

  <div class="resumo" id="resumo-grid"></div>

  <div class="section-title">Suas Faturas</div>
  <div id="faturas-list"></div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading"><div class="spinner-lg"></div><p id="loading-msg">Carregando...</p></div>

<script>
const PIX_CHAVE = '07209729496';
const PIX_NOME  = 'Haras ET';
var clienteAtual = null;
var faturasCliente = [];

function fmtM(v){ return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtD(d){ if(!d||d==='')return '—'; var p=String(d).split('-'); return p.length<3?String(d):p[2]+'/'+p[1]+'/'+p[0]; }
function showLoading(m){ document.getElementById('loading-msg').textContent=m||'Carregando...'; document.getElementById('loading').classList.add('show'); }
function hideLoading(){ document.getElementById('loading').classList.remove('show'); }
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m; el.className='toast'+(t?' '+t:'');
  el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); },2500);
}

function getToken(){ return sessionStorage.getItem('het_token'); }
function apiFetch(method, path, body){
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  var token=getToken();
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body) opts.body=JSON.stringify(body);
  return fetch('https://haraset-api.onrender.com'+path,opts)
    .then(function(r){ return r.json(); })
    .then(function(j){ if(!j.ok) throw new Error(j.erro||'Erro'); return j.data!==undefined?j.data:j; });
}

function sair(){
  sessionStorage.clear();
  window.location.href='acesso.html';
}

window.addEventListener('load',function(){
  var token=getToken();
  var perfil=sessionStorage.getItem('het_perfil');
  if(!token||perfil!=='cliente'){
    window.location.href='acesso.html#cliente'; return;
  }
  carregarPortal();
});

function carregarPortal(){
  var cid=sessionStorage.getItem('het_clienteId');
  var nome=sessionStorage.getItem('het_nome');
  clienteAtual={_id:cid,id:cid,nome:nome||'Cliente'};
  var primeiroNome=nome?nome.split(' ')[0]:'Cliente';
  document.getElementById('welcome-nome').textContent=primeiroNome;
  document.getElementById('header-nome').textContent=nome||'Cliente';
  showLoading('Carregando faturas...');
  apiFetch('GET','/api/faturas')
    .then(function(faturas){
      faturasCliente=faturas;
      hideLoading(); renderResumo(); renderFaturas();
    })
    .catch(function(e){
      hideLoading();
      window.location.href='acesso.html#cliente';
    });
}

function renderResumo(){
  var total=faturasCliente.reduce(function(s,f){ return s+parseFloat(f.total||0); },0);
  var pago=faturasCliente.filter(function(f){ return f.status==='pago'; }).reduce(function(s,f){ return s+parseFloat(f.total||0); },0);
  var pend=faturasCliente.filter(function(f){ return f.status==='pendente'; }).reduce(function(s,f){ return s+parseFloat(f.total||0); },0);
  document.getElementById('resumo-grid').innerHTML=
    '<div class="rc"><div class="rv">'+fmtM(total)+'</div><div class="rl">Total</div></div>'+
    '<div class="rc green"><div class="rv">'+fmtM(pago)+'</div><div class="rl">Pago</div></div>'+
    '<div class="rc orange"><div class="rv">'+fmtM(pend)+'</div><div class="rl">Pendente</div></div>';
}

function renderFaturas(){
  var container=document.getElementById('faturas-list');
  if(!faturasCliente.length){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">📄</div><p>Nenhuma fatura encontrada</p></div>';
    return;
  }
  var sorted=faturasCliente.slice().sort(function(a,b){ return parseInt(b.num)-parseInt(a.num); });
  container.innerHTML=sorted.map(function(f,idx){
    var id=f._id||f.id;
    var isPend=f.status==='pendente';
    return '<div class="fatura-card">'+
      '<div class="fatura-top" onclick="toggleFatura(\''+idx+'\',\''+id+'\')">' +
        '<div class="ft-left">'+
          '<h4>Fatura #'+String(f.num).padStart(4,'0')+'</h4>'+
          '<p>'+f.forma+' · Venc: '+fmtD(f.vencimento)+' · <span class="badge badge-'+f.status+'">'+f.status+'</span></p>'+
        '</div>'+
        '<div class="ft-right">'+
          '<div class="fv">'+fmtM(f.total)+'</div>'+
        '</div>'+
        '<div class="chevron" id="chev-'+idx+'">▼</div>'+
      '</div>'+
      '<div class="fatura-body" id="fb-'+idx+'">'+
        '<div id="itens-'+idx+'"><div style="text-align:center;padding:1rem;color:var(--txt3);font-size:.8rem">Carregando itens...</div></div>'+
        (isPend?renderPix(f):renderPago())+
        '<div class="fatura-actions">'+
          '<button class="btn btn-ghost btn-sm" onclick="gerarPDF(\''+id+'\','+idx+')">📄 Baixar PDF</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleFatura(idx, fatId){
  var body=document.getElementById('fb-'+idx);
  var chev=document.getElementById('chev-'+idx);
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open'); chev.classList.toggle('open');
  if(!isOpen){
    apiFetch('GET','/api/faturas/'+fatId+'/itens').then(function(itens){
      document.getElementById('itens-'+idx).innerHTML=renderItens(itens);
    }).catch(function(){ document.getElementById('itens-'+idx).innerHTML=''; });
  }
}

function renderItens(itens){
  if(!itens||!itens.length) return '';
  return '<table class="itens-table">'+
    '<thead><tr><th>Descrição</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead>'+
    '<tbody>'+itens.map(function(i){
      return '<tr><td>'+i.desc+'</td><td>'+i.qty+'</td><td>'+fmtM(i.price)+'</td><td>'+fmtM(i.total)+'</td></tr>';
    }).join('')+
    '<tr><td colspan="3" style="font-weight:600;color:var(--txt)">Total</td><td>'+fmtM(itens.reduce(function(s,i){return s+parseFloat(i.total||0);},0))+'</td></tr>'+
    '</tbody></table>';
}

function renderPago(){
  return '<div class="pago-ok">✅ Esta fatura já foi paga. Obrigado!</div>';
}

function renderPix(f){
  var chave=PIX_CHAVE;
  var valor=parseFloat(f.total||0).toFixed(2);
  var payload=gerarPayloadPix(chave,PIX_NOME,valor,'Fat'+f.num);
  var qrUrl='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+encodeURIComponent(payload);
  return '<div class="pix-box">'+
    '<h4>Pagar via PIX</h4>'+
    '<div class="pix-amount">'+fmtM(f.total)+'</div>'+
    '<div class="pix-qr"><img src="'+qrUrl+'" alt="QR Code PIX"/></div>'+
    '<div class="pix-key"><span>'+chave+'</span><button class="copy-btn" onclick="copiarChave(\''+chave+'\')">Copiar Chave</button></div>'+
    '<div class="pix-steps"><strong>Como pagar:</strong><br>1. Abra o app do seu banco<br>2. Escaneie o QR Code ou copie a chave PIX<br>3. Confirme o valor de <strong>'+fmtM(f.total)+'</strong><br>4. Envie o comprovante via WhatsApp ao Haras ET</div>'+
  '</div>';
}

function copiarChave(chave){
  navigator.clipboard.writeText(chave)
    .then(function(){ toast('Chave PIX copiada!','success'); })
    .catch(function(){
      var el=document.createElement('textarea'); el.value=chave;
      document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
      toast('Chave PIX copiada!','success');
    });
}

function gerarPayloadPix(chave,nome,valor,desc){
  function campo(id,v){ var s=String(v); return id+String(s.length).padStart(2,'0')+s; }
  var mai=campo('00','BR.GOV.BCB.PIX')+campo('01',chave)+(desc?campo('02',desc.substring(0,25)):'');
  var payload=campo('00','01')+campo('26',mai)+campo('52','0000')+campo('53','986')+campo('54',valor)+campo('58','BR')+campo('59',nome.substring(0,25))+campo('60','Recife')+campo('62',campo('05','***'))+'6304';
  var crc=0xFFFF;
  for(var i=0;i<payload.length;i++){ crc^=payload.charCodeAt(i)<<8; for(var j=0;j<8;j++){ if(crc&0x8000)crc=(crc<<1)^0x1021; else crc<<=1; crc&=0xFFFF; } }
  return payload+crc.toString(16).toUpperCase().padStart(4,'0');
}

async function gerarPDF(fatId,idx){
  showLoading('Gerando PDF...');
  try{
    var fat=await apiFetch('GET','/api/faturas/'+fatId);
    var itens=await apiFetch('GET','/api/faturas/'+fatId+'/itens');
    hideLoading(); gerarPDFObj(fat,itens);
  }catch(e){ hideLoading(); toast('Erro ao gerar PDF','error'); }
}

function gerarPDFObj(f,itens){
  var {jsPDF}=window.jspdf; var doc=new jsPDF();
  var gold=[184,134,11],dk=[61,46,30],gr=[122,106,90],lg=[200,195,185],bg=[250,247,242];
  doc.setFillColor(...bg); doc.rect(0,0,210,40,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(...gold); doc.text('HARAS ET',14,18);
  doc.setFontSize(8); doc.setTextColor(...gr);
  doc.text('Criatório Mangalarga Marchador · Marcha Picada · @haras_et',14,25);
  doc.text('Aldeia · Pernambuco · Brasil',14,31);
  doc.setDrawColor(...gold); doc.setLineWidth(1); doc.line(0,40,210,40);
  doc.setFillColor(...gold); doc.rect(145,8,55,24,'F');
  doc.setTextColor(250,247,242); doc.setFontSize(14); doc.text('FATURA',147,19);
  doc.setFontSize(10); doc.text('#'+String(f.num).padStart(4,'0'),147,27);
  var y=50;
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...gold);
  doc.text('CLIENTE',14,y); doc.text('EMISSÃO',100,y); doc.text('VENCIMENTO',145,y); y+=5;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dk);
  var nome=clienteAtual?clienteAtual.nome:'—';
  doc.text(nome,14,y); doc.text(fmtD(f.emissao),100,y); doc.text(fmtD(f.vencimento),145,y);
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(...gold); doc.text('FORMA',100,y+10);
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dk); doc.text(f.forma||'',100,y+15); y+=24;
  doc.setFillColor(...gold); doc.rect(14,y,182,7,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(250,247,242);
  doc.text('DESCRIÇÃO',16,y+5); doc.text('QTD',118,y+5); doc.text('UNIT.',136,y+5); doc.text('TOTAL',168,y+5); y+=10;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  (itens||[]).forEach(function(item,idx){
    if(idx%2===0){doc.setFillColor(...bg);doc.rect(14,y-4,182,7,'F');}
    doc.setTextColor(...gr); doc.text(String(item.desc||''),16,y+1,{maxWidth:98});
    doc.text(String(item.qty||1),120,y+1); doc.text(fmtM(item.price),136,y+1); doc.text(fmtM(item.total),168,y+1); y+=8;
  });
  y+=4; doc.setDrawColor(...gold); doc.setLineWidth(0.5); doc.line(14,y,196,y); y+=6;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...dk); doc.text('TOTAL:',138,y);
  doc.setTextColor(...gold); doc.text(fmtM(f.total),160,y);
  if(f.status==='pago'){doc.setFillColor(46,125,50);doc.rect(14,y-6,32,10,'F');doc.setTextColor(255,255,255);doc.setFontSize(8);doc.text('PAGO',17,y+1);}
  if(f.status==='pendente'){y+=14;doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...gold);doc.text('PAGAMENTO VIA PIX',14,y);y+=5;doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...gr);doc.text('Chave: '+PIX_CHAVE+'  ·  Favorecido: '+PIX_NOME,14,y);}
  doc.setFillColor(...gold);doc.rect(0,272,210,25,'F');
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(250,247,242);
  doc.text('Haras ET · Criatório Mangalarga Marchador · @haras_et · Aldeia - PE',105,281,{align:'center'});
  doc.setTextColor(250,247,242);doc.setFontSize(8);doc.text('Obrigado pela confiança!',105,287,{align:'center'});
  doc.save('Fatura_HarasET_'+f.num+'.pdf');
  toast('PDF gerado!','success');
}
</script>
</body>
</html>
